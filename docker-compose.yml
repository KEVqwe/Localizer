version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "0.0.0.0:6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning --requirepass ${REDIS_PASSWORD:-local_dev_only}
    networks:
      - lan_net

volumes:
  redis_data:

networks:
  lan_net:
    driver: bridge
